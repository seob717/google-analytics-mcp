name: Sync upstream (weekly PR)

# Weekly: check googleanalytics/google-analytics-mcp for new commits and open a
# PR bringing them into the install branch. Your admin-tool commits stay.
#
# Requires a PAT (scopes: repo, workflow) stored as the SYNC_TOKEN secret — the
# default GITHUB_TOKEN can't push branches containing workflow files. Without it,
# this job warns and skips instead of failing.
#
# Runs from the default branch only (GitHub restriction for scheduled workflows).

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

env:
  BASE_BRANCH: feat/google-ads-mcp-setup
  UPSTREAM_URL: https://github.com/googleanalytics/google-analytics-mcp.git
  UPSTREAM_BRANCH: main
  SYNC_BRANCH: sync-upstream

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Require SYNC_TOKEN
        id: gate
        env:
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          if [ -z "$SYNC_TOKEN" ]; then
            echo "::warning::Add a PAT (scopes: repo, workflow) as the SYNC_TOKEN secret to enable upstream auto-sync. Skipping."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.gate.outputs.ok == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BASE_BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.SYNC_TOKEN }}

      - name: Fetch upstream
        if: steps.gate.outputs.ok == 'true'
        run: |
          git remote add upstream "$UPSTREAM_URL"
          git fetch upstream "$UPSTREAM_BRANCH"

      - name: Skip if already up to date
        if: steps.gate.outputs.ok == 'true'
        id: check
        run: |
          if git merge-base --is-ancestor "upstream/$UPSTREAM_BRANCH" "origin/$BASE_BRANCH"; then
            echo "Fork's $BASE_BRANCH already contains upstream/$UPSTREAM_BRANCH — nothing to sync."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push upstream snapshot and open PR
        if: steps.gate.outputs.ok == 'true' && steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          git branch -f "$SYNC_BRANCH" "upstream/$UPSTREAM_BRANCH"
          git push -f origin "$SYNC_BRANCH"
          existing="$(gh pr list --base "$BASE_BRANCH" --head "$SYNC_BRANCH" --state open --json number --jq '.[0].number')"
          if [ -n "$existing" ]; then
            echo "Sync PR #$existing already open — refreshed by the force-push above."
          else
            gh pr create \
              --base "$BASE_BRANCH" --head "$SYNC_BRANCH" \
              --title "Sync upstream → $BASE_BRANCH" \
              --body "Automated weekly sync of \`googleanalytics/google-analytics-mcp@$UPSTREAM_BRANCH\`. Merge to bring Google's latest into the fork — your admin tools stay. If GitHub flags conflicts, resolve them here, then re-run \`setup.sh\` (or \`uv tool upgrade analytics-mcp\`) locally to pick up the update."
          fi
